<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Third Edge — Rage · Chill · Spark</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Special+Elite&family=Orbitron:wght@700&family=Pacifico&family=Bebas+Neue&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0B0F1A;font-family:'Outfit',sans-serif;color:#E2E8F0;min-height:100vh;display:flex;flex-direction:column;align-items:center}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes flipIn{from{opacity:0;transform:rotateY(90deg)}to{opacity:1;transform:rotateY(0)}}
@keyframes attrReveal{0%{opacity:0;transform:scale(.3)}50%{opacity:1;transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes winGlow{0%{box-shadow:0 0 20px rgba(16,185,129,.3)}50%{box-shadow:0 0 50px rgba(16,185,129,.6)}100%{box-shadow:0 0 20px rgba(16,185,129,.3)}}
@keyframes loseGlow{0%{box-shadow:0 0 20px rgba(239,68,68,.3)}50%{box-shadow:0 0 50px rgba(239,68,68,.6)}100%{box-shadow:0 0 20px rgba(239,68,68,.3)}}
@keyframes scorePopIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
.btn{padding:12px 28px;border-radius:12px;border:none;font-family:'Outfit',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;letter-spacing:1px;text-transform:uppercase}
.btn:hover{transform:translateY(-2px)}.btn:disabled{opacity:.4;cursor:default;transform:none!important}
.btn-p{background:linear-gradient(135deg,#DC2626,#B91C1C);color:white}
.btn-p:hover:not(:disabled){box-shadow:0 8px 24px rgba(220,38,38,.4)}
.btn-s{background:rgba(255,255,255,.08);color:#E2E8F0;border:1px solid rgba(255,255,255,.15)}
.btn-s:hover{background:rgba(255,255,255,.15)}
.btn-danger{background:rgba(239,68,68,.12);color:#EF4444;border:1px solid rgba(239,68,68,.2)}
.btn-danger:hover{background:rgba(239,68,68,.2)}
input,textarea{font-family:'Outfit',sans-serif}
/* Custom card fonts */
.cf-outfit{font-family:'Outfit',sans-serif;font-weight:800;font-size:13px;letter-spacing:2px;}
.cf-orbitron{font-family:'Orbitron',sans-serif;font-weight:700;font-size:10px;letter-spacing:2px;}
.cf-pacifico{font-family:'Pacifico',cursive;font-size:14px;letter-spacing:0.5px;margin-bottom:-4px;}
.cf-bebas{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:4px;margin-bottom:-4px;}
.cf-playfair{font-family:'Playfair Display',serif;font-weight:700;font-style:italic;font-size:14px;letter-spacing:1px;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

function useIsMobile(breakpoint=600){
  const[mobile,setMobile]=useState(window.innerWidth<breakpoint);
  useEffect(()=>{
    const handler=()=>setMobile(window.innerWidth<breakpoint);
    window.addEventListener("resize",handler);
    return()=>window.removeEventListener("resize",handler);
  },[breakpoint]);
  return mobile;
}

/* ═══ PLAYER IDENTITY ═════════════════════════════════════ */
const LOCAL_PLAYER_ID = (() => {
  let id = localStorage.getItem("te_player_id");
  if (!id) { id = `lp_${Date.now()}_${Math.random().toString(36).slice(2,8)}`; localStorage.setItem("te_player_id", id); }
  return id;
})();

/* ═══ CUSTOM CARD FONTS ════════════════════════════════════ */
const FONTS = [
  { id:"outfit",   label:"Modern",    cls:"cf-outfit"   },
  { id:"orbitron", label:"Tech",      cls:"cf-orbitron" },
  { id:"pacifico", label:"Script",    cls:"cf-pacifico" },
  { id:"bebas",    label:"Bold",      cls:"cf-bebas"    },
  { id:"playfair", label:"Elegant",   cls:"cf-playfair" },
];

/* ═══ THEME ═══════════════════════════════════════════════ */
const SYM = ["🔥","❄️","⚡"];
const CLR = ["#DC2626","#0EA5E9","#EAB308"];
const CLR_GLOW = ["rgba(220,38,38,.4)","rgba(14,165,233,.4)","rgba(234,179,8,.4)"];
const ANAME = ["Rage","Chill","Spark"];
const CAP = 27;

/* ═══ CARD UNIVERSE ═══════════════════════════════════════
   27-total: Standard  (c0–c20)
   24-total: Focused   (c21–c38)
   21-total: Specialist (c39–c53)
══════════════════════════════════════════════════════════ */
const CARD_MAP={};
const CARDS_27=[];const CARDS_24=[];const CARDS_21=[];

function buildTier(shapes,pool){
  const seen=new Set();
  shapes.forEach(shape=>{
    [[shape[0],shape[1],shape[2]],[shape[1],shape[2],shape[0]],[shape[2],shape[0],shape[1]],
     [shape[0],shape[2],shape[1]],[shape[1],shape[0],shape[2]],[shape[2],shape[1],shape[0]]].forEach(p=>{
      const key=p.join("-");
      if(!seen.has(key)){
        seen.add(key);
        const id=`c${Object.keys(CARD_MAP).length}`;
        const dom=p.indexOf(Math.max(...p));
        const sorted=[...p].sort((a,b)=>b-a);
        const card={id,attrs:[...p],dom,tier:p.reduce((a,b)=>a+b,0)};
        pool.push(card);CARD_MAP[id]=card;
      }
    });
  });
}
buildTier([[15,9,3],[15,6,6],[12,12,3],[12,9,6]],CARDS_27);
buildTier([[15,6,3],[12,9,3],[12,6,6],[9,9,6]],CARDS_24);
buildTier([[15,3,3],[12,6,3],[9,9,3],[9,6,6]],CARDS_21);
const ALL_CARDS=[...CARDS_27,...CARDS_24,...CARDS_21];

function cardTier(id){
  if(id&&id.startsWith("cc_"))return null;
  return CARD_MAP[id]?.tier||27;
}
const TIER_CLR={27:"#10B981",24:"#F59E0B",21:"#EF4444"};
const TIER_LABEL={27:"Standard",24:"Focused",21:"Specialist"};

/* ═══ API ═════════════════════════════════════════════════ */
const API = "";  // same origin
async function api(path, body) {
  const opts = body ? { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) } : {};
  const r = await fetch(API+"/api/"+path, opts);
  return r.json();
}

/* ═══ HELPERS ═════════════════════════════════════════════ */
const cardGrad=(attrs)=>{
  const t=attrs[0]+attrs[1]+attrs[2];if(t===0)return"linear-gradient(180deg,#1e293b,#0f172a)";
  const sorted=[0,1,2].sort((a,b)=>attrs[b]-attrs[a]);let pos=0;const stops=[];
  for(const idx of sorted){const pct=Math.round((attrs[idx]/t)*100);stops.push(`${CLR[idx]} ${pos}%`);pos+=pct;stops.push(`${CLR[idx]} ${pos}%`);}
  return`linear-gradient(180deg,${stops.join(",")})`;
};

/* ═══ CARD VIEW ═══════════════════════════════════════════ */
function CustomCardView({card,onClick,sel,dim,small}){
  const s=small?0.665:1;const w=188*s;const h=255*s;
  const font=FONTS.find(f=>f.id===card.font)||FONTS[0];
  const tier=card.attrs.reduce((a,b)=>a+b,0);
  return React.createElement("div",{onClick:dim?undefined:onClick,style:{
    width:w,height:h,borderRadius:14*s,position:"relative",overflow:"hidden",cursor:dim?"default":onClick?"pointer":"default",
    opacity:dim?0.35:1,transform:sel?"scale(1.06) translateY(-4px)":"scale(1)",transition:"all 0.2s cubic-bezier(.4,0,.2,1)",
    boxShadow:sel?"0 0 0 3px white, 0 12px 40px rgba(0,0,0,0.7)":"0 0 0 2px #9CA3AF, 0 0 0 3px #4B5563, 0 8px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.15)"}},
    // Image area (flush left, 75%)
    React.createElement("div",{style:{
      position:"absolute",left:0,top:0,bottom:0,width:"75%",
      background:card.imageUrl?`url(${card.imageUrl})`:`linear-gradient(160deg,${CLR[0]}44,${CLR[1]}44,${CLR[2]}44)`,
      backgroundSize:card.imageUrl?`${(card.imgScale||1)*100}% auto`:"cover",
      backgroundPosition:card.imageUrl?`${card.imgX||50}% ${card.imgY||50}%`:"center",
      backgroundRepeat:"no-repeat"}}),
    // Color strips (right 25%) - sorted largest first to match generic card gradient order
    React.createElement("div",{style:{position:"absolute",right:0,top:0,bottom:0,width:"25%",display:"flex",flexDirection:"column",borderLeft:"1px solid rgba(255,255,255,0.1)"}},
      [0,1,2].sort((a,b)=>card.attrs[b]-card.attrs[a]).map(a=>React.createElement("div",{key:a,style:{flex:card.attrs[a],background:CLR[a],position:"relative",display:"flex",alignItems:"center",justifyContent:"center"}},
        React.createElement("span",{style:{fontSize:Math.max(11,13*s),fontWeight:900,fontFamily:"'Outfit',sans-serif",color:"white",textShadow:"0 1px 4px rgba(0,0,0,0.8), 0 0 8px rgba(0,0,0,0.6)"}},card.attrs[a])
      ))
    ),
    // Tier badge (top-left)
    React.createElement("div",{style:{position:"absolute",top:6*s,left:6*s,
      background:"rgba(0,0,0,0.75)",borderRadius:4*s,
      padding:`${2*s}px ${5*s}px`,fontSize:Math.max(11,14*s),fontWeight:900,
      fontFamily:"'Outfit',sans-serif",color:"white",lineHeight:1,letterSpacing:0}},
      tier),
    // Metallic sheen overlay
    React.createElement("div",{style:{position:"absolute",inset:0,background:"linear-gradient(135deg,rgba(255,255,255,0.07) 0%,transparent 40%,transparent 60%,rgba(255,255,255,0.03) 100%)",pointerEvents:"none"}}),
    // Bottom name fade
    React.createElement("div",{style:{position:"absolute",bottom:0,left:0,width:"75%",padding:`${10*s}px ${10*s}px ${9*s}px`,
      background:"linear-gradient(to top,rgba(0,0,0,0.92) 0%,rgba(0,0,0,0.6) 60%,transparent 100%)"}},
      React.createElement("div",{className:font.cls,style:{color:"white",textShadow:"0 1px 6px rgba(0,0,0,0.9)",
        whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",
        fontSize:`${parseFloat(font.cls==="cf-orbitron"?10:font.cls==="cf-bebas"?20:font.cls==="cf-pacifico"?14:font.cls==="cf-outfit"?13:14)*s}px`}},
        card.name)
    )
  );
}

function CardView({card,onClick,sel,dim,small,hl}){
  if(card.id&&card.id.startsWith("cc_"))return React.createElement(CustomCardView,{card,onClick,sel,dim,small});
  const s=small?1.0:1;const w=125*s;const h=170*s;
  return React.createElement("div",{onClick:dim?undefined:onClick,style:{
    width:w,minHeight:h,borderRadius:12*s,background:cardGrad(card.attrs),
    border:sel?"3px solid white":hl?`3px solid ${CLR[card.dom]}`:"2px solid rgba(255,255,255,0.12)",
    cursor:dim?"default":onClick?"pointer":"default",opacity:dim?0.3:1,
    transform:sel?"scale(1.08) translateY(-4px)":"scale(1)",transition:"all 0.2s cubic-bezier(.4,0,.2,1)",
    display:"flex",flexDirection:"column",justifyContent:"flex-end",padding:8*s,
    boxShadow:sel?`0 8px 32px ${CLR_GLOW[card.dom]}`:"0 4px 16px rgba(0,0,0,0.4)",
    position:"relative",overflow:"hidden"}},
    // Attr values
    React.createElement("div",{style:{position:"absolute",top:8*s,right:6*s,display:"flex",flexDirection:"column",gap:2*s}},
      [0,1,2].map(a=>React.createElement("div",{key:a,style:{display:"flex",alignItems:"center",gap:3*s,
        background:"rgba(0,0,0,0.55)",borderRadius:4*s,padding:`${1*s}px ${5*s}px`,backdropFilter:"blur(4px)"}},
        React.createElement("span",{style:{fontSize:10*s}},SYM[a]),
        React.createElement("span",{style:{fontSize:12*s,fontWeight:800,color:"white",textShadow:"0 1px 2px rgba(0,0,0,0.7)",minWidth:16*s,textAlign:"right"}},card.attrs[a])
      ))
    ),
    // Tier badge (top-left) - BLACK with white number
    React.createElement("div",{style:{position:"absolute",top:6*s,left:6*s,
      background:"rgba(0,0,0,0.75)",borderRadius:4*s,
      padding:`${2*s}px ${5*s}px`,fontSize:Math.max(11,14*s),fontWeight:900,
      fontFamily:"'Outfit',sans-serif",color:"white",lineHeight:1,letterSpacing:0}},
      card.tier),
    // Bottom label
    React.createElement("div",{style:{background:"rgba(0,0,0,0.6)",borderRadius:8*s,padding:`${4*s}px ${7*s}px`,backdropFilter:"blur(4px)",textAlign:"center"}},
      React.createElement("div",{style:{fontSize:9*s,color:"rgba(255,255,255,0.7)",fontWeight:700}},ANAME[card.dom]),
      React.createElement("div",{style:{fontSize:8*s,color:"rgba(255,255,255,0.4)",fontWeight:600,marginTop:1*s}},card.attrs.join("-"))
    )
  );
}

/* ═══ ATTR COUNTDOWN ══════════════════════════════════════ */
function AttrCount({history,carry}){
  const left=[3,3,3];(history||[]).forEach(r=>left[r.attr]--);
  return React.createElement("div",{style:{display:"flex",gap:14,justifyContent:"center",padding:"8px 0"}},
    [0,1,2].map(a=>React.createElement("div",{key:a,style:{display:"flex",flexDirection:"column",alignItems:"center",gap:4,opacity:left[a]===0?0.2:1,transition:"opacity 0.3s"}},
      React.createElement("span",{style:{fontSize:24}},SYM[a]),
      React.createElement("div",{style:{display:"flex",gap:3}},
        [0,1,2].map(i=>React.createElement("div",{key:i,style:{width:9,height:9,borderRadius:"50%",background:i<left[a]?CLR[a]:"rgba(255,255,255,0.1)",boxShadow:i<left[a]?`0 0 6px ${CLR_GLOW[a]}`:"none"}}))
      ),
      React.createElement("span",{style:{fontSize:8,fontWeight:700,color:left[a]>0?CLR[a]:"#334155"}},ANAME[a])
    )),
    carry>0&&React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:4,animation:"pulse 1s infinite"}},
      React.createElement("span",{style:{fontSize:16,fontWeight:900,color:"#F59E0B"}},"+"+carry),
      React.createElement("span",{style:{fontSize:8,color:"#F59E0B",fontWeight:600}},"CARRY")
    )
  );
}

/* ═══ CARD CREATOR ════════════════════════════════════════ */
function CardCreator({onBack,onSaved,startTab}){
  const h=React.createElement;
  const[cards,setCards]=useState([]);
  const[name,setName]=useState("");
  const[font,setFont]=useState("outfit");
  const[imageUrl,setImageUrl]=useState("");
  const[imgPreview,setImgPreview]=useState("");
  const[imgScale,setImgScale]=useState(1);
  const[imgX,setImgX]=useState(50);
  const[imgY,setImgY]=useState(50);
  const[cardTierSel,setCardTierSel]=useState(27);
  const[attrs,setAttrs]=useState([12,9,6]);
  const[saving,setSaving]=useState(false);
  const[generating,setGenerating]=useState(false);
  const[err,setErr]=useState("");
  const[tab,setTab]=useState(startTab||"create");
  const dragRef=useRef({active:false,lastX:0,lastY:0});

  useEffect(()=>{ loadCards(); },[]);

  async function generateCard(){
    setGenerating(true);setErr("");
    for(let attempt=0;attempt<10;attempt++){
      try{
        const r=await fetch("https://en.wikipedia.org/w/api.php?action=query&generator=random&grnnamespace=0&prop=pageimages&piprop=thumbnail&pithumbsize=800&format=json&origin=*");
        const d=await r.json();
        const page=Object.values(d.query?.pages||{})[0];
        const thumb=page?.thumbnail;
        if(thumb?.source && thumb.height>thumb.width){
          const title=page.title.replace(/\s*\(.*?\)/g,"").trim().slice(0,20);
          setImgPreview(thumb.source);
          setImageUrl(thumb.source);
          setImgX(50);setImgY(50);setImgScale(1);
          setName(title);
          setGenerating(false);return;
        }
      }catch(e){}
    }
    setErr("No image found — try again");
    setGenerating(false);
  }

  async function loadCards(){
    const r=await fetch(`/api/cards?playerId=${LOCAL_PLAYER_ID}`);
    const d=await r.json();
    if(d.cards)setCards(d.cards);
  }

  function selectTier(t){
    setCardTierSel(t);
    if(t===27)setAttrs([12,9,6]);
    else if(t===24)setAttrs([12,9,3]);
    else setAttrs([12,6,3]);
  }

  function adjustAttr(i,delta){
    const next=[...attrs];
    const newVal=next[i]+delta;
    if(newVal<3||newVal>21)return;
    const others=[0,1,2].filter(x=>x!==i);
    const o=others.find(x=>delta>0?next[x]-delta>=3:next[x]-delta<=21);
    if(o===undefined)return;
    next[i]=newVal;next[o]-=delta;
    setAttrs(next);
  }

  function onDragStart(e){
    e.preventDefault();
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    dragRef.current={active:true,lastX:cx,lastY:cy};
  }
  function onDragMove(e){
    if(!dragRef.current.active)return;
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    const dx=cx-dragRef.current.lastX;
    const dy=cy-dragRef.current.lastY;
    dragRef.current.lastX=cx;dragRef.current.lastY=cy;
    setImgX(x=>Math.max(0,Math.min(100,x-dx*0.4)));
    setImgY(y=>Math.max(0,Math.min(100,y-dy*0.4)));
  }
  function onDragEnd(){ dragRef.current.active=false; }

  async function saveCard(){
    if(!name.trim()){setErr("Card needs a name");return;}
    if(attrs[0]===attrs[1]&&attrs[1]===attrs[2]){setErr("All three attributes can't be equal — add some variety!");return;}
    const attrSum=attrs.reduce((a,b)=>a+b,0);
    if(attrSum!==cardTierSel){setErr(`Attributes must sum to ${cardTierSel} for this tier`);return;}
    setSaving(true);setErr("");
    const r=await fetch("/api/cards",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({playerId:LOCAL_PLAYER_ID,name,font,imageUrl:imgPreview||null,attrs,imgScale,imgX,imgY})});
    const d=await r.json();
    setSaving(false);
    if(d.error){setErr(d.error);return;}
    const newCards=[...cards,d.card];
    setCards(newCards);
    if(onSaved)onSaved(d.card);
    setName("");setImageUrl("");setImgPreview("");setImgScale(1);setImgX(50);setImgY(50);setAttrs([9,9,9]);
    setTab("library");
  }

  async function deleteCard(cardId){
    await fetch(`/api/cards/${cardId}`,{method:"DELETE",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({playerId:LOCAL_PLAYER_ID})});
    setCards(c=>c.filter(x=>x.id!==cardId));
  }

  const previewCard={id:"cc_preview",name:name||"Card Name",font,imageUrl:imgPreview||null,imgScale,imgX,imgY,attrs};

  return h("div",{style:{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",width:"100%"}},
    // Header
    h("div",{style:{width:"100%",padding:"12px 24px",display:"flex",alignItems:"center",gap:12,
      background:"rgba(11,15,26,.95)",borderBottom:"1px solid rgba(255,255,255,0.05)"}},
      h("button",{className:"btn btn-s",onClick:onBack,style:{padding:"6px 14px",fontSize:12}},
        onSaved?"← Back to Hand":"← Back"),
      h("span",{style:{fontSize:16,fontWeight:800,letterSpacing:2,color:"#E2E8F0"}},"CARD CREATOR"),
      h("span",{style:{fontSize:12,color:"#64748B",marginLeft:"auto"}},cards.length+"/7 cards")
    ),
    // Tabs
    h("div",{style:{display:"flex",borderBottom:"1px solid rgba(255,255,255,0.06)",width:"100%",maxWidth:800}},
      [["create","+ Create"],["library","My Cards ("+cards.length+")"]].map(([t,label])=>
        h("button",{key:t,onClick:()=>setTab(t),style:{
          flex:1,padding:"12px",background:"none",border:"none",cursor:"pointer",fontSize:13,fontWeight:700,
          letterSpacing:1,textTransform:"uppercase",fontFamily:"'Outfit',sans-serif",
          color:tab===t?"#F1F5F9":"#94A3B8",
          borderBottom:tab===t?"2px solid #DC2626":"2px solid transparent",
          transition:"color .2s"}},label))
    ),

    // ── CREATE TAB ──
    tab==="create"&&h("div",{style:{width:"100%",maxWidth:800,padding:"20px 16px",display:"flex",gap:24,flexWrap:"wrap",justifyContent:"center",animation:"fadeIn .3s ease"}},

      // Left: form
      h("div",{style:{flex:"1",minWidth:280,display:"flex",flexDirection:"column",gap:16}},

        // Name
        h("div",null,
          h("div",{style:{fontSize:11,fontWeight:700,letterSpacing:2,color:"#64748B",marginBottom:6}},"CARD NAME"),
          h("div",{style:{position:"relative"}},
            h("input",{value:name,onChange:e=>setName(e.target.value.slice(0,20)),maxLength:20,
              placeholder:"Enter card name...",
              style:{width:"100%",padding:"10px 12px",background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",
                borderRadius:8,color:"white",fontSize:14,outline:"none"}}),
            h("span",{style:{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",
              fontSize:11,color:name.length>=18?"#EF4444":"#475569"}},name.length+"/20")
          )
        ),

        // Font
        h("div",null,
          h("div",{style:{fontSize:11,fontWeight:700,letterSpacing:2,color:"#64748B",marginBottom:6}},"FONT"),
          h("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
            FONTS.map(f=>h("button",{key:f.id,onClick:()=>setFont(f.id),style:{
              padding:"6px 12px",borderRadius:8,border:"none",cursor:"pointer",transition:"all .2s",
              background:font===f.id?"rgba(220,38,38,.2)":"rgba(255,255,255,.08)",
              color:font===f.id?"#FCA5A5":"#CBD5E1",
              outline:font===f.id?"1px solid rgba(220,38,38,.4)":"1px solid rgba(255,255,255,.08)"}},
              h("span",{className:f.cls,style:{fontSize:12}},f.label)))
          )
        ),

        // Image URL
        // Generate from Wikipedia
        h("div",null,
          h("div",{style:{fontSize:11,fontWeight:700,letterSpacing:2,color:"#64748B",marginBottom:6}},"IMAGE"),
          h("button",{
            onClick:generateCard,
            disabled:generating,
            style:{width:"100%",padding:"11px",borderRadius:10,border:"1px solid rgba(99,102,241,.35)",
              background:generating?"rgba(99,102,241,.08)":"rgba(99,102,241,.12)",
              color:generating?"#6366F1":"#A5B4FC",cursor:generating?"default":"pointer",
              fontFamily:"'Outfit',sans-serif",fontWeight:700,fontSize:13,letterSpacing:1,
              transition:"all .2s",display:"flex",alignItems:"center",justifyContent:"center",gap:8}},
            generating
              ?h("span",{style:{display:"flex",alignItems:"center",gap:8}},
                  h("span",{style:{width:14,height:14,border:"2px solid rgba(99,102,241,.3)",borderTopColor:"#6366F1",borderRadius:"50%",animation:"spin 1s linear infinite",display:"inline-block"}}),
                  "Finding image...")
              :imgPreview?"⚡ Generate Another":"⚡ Generate Random Card"
          ),
          h("div",{style:{textAlign:"center",fontSize:11,color:"#334155",margin:"6px 0"}},"— or paste a URL —"),
          h("div",{style:{display:"flex",gap:8}},
            h("input",{value:imageUrl,onChange:e=>setImageUrl(e.target.value),
              placeholder:"https://...",
              style:{flex:1,padding:"10px 12px",background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",
                borderRadius:8,color:"white",fontSize:13,outline:"none"}}),
            h("button",{className:"btn btn-s",onClick:()=>{setImgPreview(imageUrl);setImgX(50);setImgY(50);setImgScale(1);},
              style:{padding:"8px 14px",fontSize:12,whiteSpace:"nowrap"}},"Load")
          ),
          imgPreview&&h("div",{style:{fontSize:11,color:"#64748B",marginTop:4}},"Drag image in preview to reposition")
        ),

        // Zoom slider (only if image loaded)
        imgPreview&&h("div",null,
          h("div",{style:{fontSize:11,fontWeight:700,letterSpacing:2,color:"#64748B",marginBottom:4}},"ZOOM  "+Math.round(imgScale*100)+"%"),
          h("input",{type:"range",min:1,max:3,step:0.05,value:imgScale,
            onChange:e=>setImgScale(parseFloat(e.target.value)),style:{width:"100%",accentColor:"#DC2626"}})
        ),

        // Attributes
        h("div",null,
          h("div",{style:{fontSize:11,fontWeight:700,letterSpacing:2,color:"#64748B",marginBottom:6}},"CARD TIER"),
          h("div",{style:{display:"flex",gap:6,marginBottom:10}},
            [{t:27,label:"Standard",sub:"27 pts"},{t:24,label:"Focused",sub:"24 pts"},{t:21,label:"Specialist",sub:"21 pts"}].map(({t,label,sub})=>
              h("button",{key:t,onClick:()=>selectTier(t),style:{
                flex:1,padding:"8px 4px",borderRadius:8,border:"none",cursor:"pointer",transition:"all .2s",
                background:cardTierSel===t?"rgba(220,38,38,.2)":"rgba(255,255,255,.06)",
                outline:cardTierSel===t?"1px solid rgba(220,38,38,.5)":"1px solid rgba(255,255,255,.08)",
                color:cardTierSel===t?"#FCA5A5":"#94A3B8"}},
                h("div",{style:{fontSize:11,fontWeight:700}},label),
                h("div",{style:{fontSize:10,opacity:.7}},sub)
              )
            )
          ),
          h("div",{style:{fontSize:11,fontWeight:700,letterSpacing:2,color:"#64748B",marginBottom:8}},`ATTRIBUTES  (SUM: ${attrs.reduce((a,b)=>a+b,0)}/${cardTierSel})`),
          h("div",{style:{display:"flex",flexDirection:"column",gap:8}},
            [0,1,2].map(i=>h("div",{key:i,style:{display:"flex",alignItems:"center",gap:10}},
              h("span",{style:{fontSize:18,width:24}},SYM[i]),
              h("span",{style:{fontSize:11,fontWeight:700,color:CLR[i],width:36,letterSpacing:1}},ANAME[i]),
              h("button",{onClick:()=>adjustAttr(i,-3),style:{width:28,height:28,borderRadius:6,border:"none",
                background:"rgba(255,255,255,.08)",color:"white",cursor:"pointer",fontSize:16,fontWeight:700}},"-"),
              h("span",{style:{fontSize:18,fontWeight:800,color:"white",width:28,textAlign:"center"}},attrs[i]),
              h("button",{onClick:()=>adjustAttr(i,3),style:{width:28,height:28,borderRadius:6,border:"none",
                background:"rgba(255,255,255,.08)",color:"white",cursor:"pointer",fontSize:16,fontWeight:700}},"+"),
              h("div",{style:{flex:1,height:6,borderRadius:3,background:"rgba(255,255,255,.06)"}},
                h("div",{style:{width:`${(attrs[i]/21)*100}%`,height:"100%",borderRadius:3,background:CLR[i],transition:"width .2s"}}))
            ))
          )
        ),

        err&&h("div",{style:{color:"#EF4444",fontSize:13,fontWeight:600}},err),
        cards.length>=7
          ?h("div",{style:{background:"rgba(234,179,8,.08)",border:"1px solid rgba(234,179,8,.25)",borderRadius:10,padding:"12px 16px",marginTop:4}},
              h("div",{style:{fontSize:13,fontWeight:700,color:"#FCD34D",marginBottom:6}},"Library full — 7/7 cards"),
              h("div",{style:{fontSize:12,color:"#94A3B8",marginBottom:10}},"Delete a card from My Cards to create a new one."),
              h("button",{className:"btn btn-s",onClick:()=>setTab("library"),style:{fontSize:12,padding:"6px 18px"}},"Go to My Cards →")
            )
          :h("button",{className:"btn btn-p",onClick:saveCard,disabled:saving,style:{marginTop:4}},
              saving?"Saving...":"Save Card →")
      ),

      // Right: preview with drag-to-pan
      h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:8}},
        h("div",{style:{fontSize:11,fontWeight:700,letterSpacing:2,color:"#64748B"}},"PREVIEW"),
        h("div",{
          onMouseDown:imgPreview?onDragStart:undefined,
          onMouseMove:imgPreview?onDragMove:undefined,
          onMouseUp:imgPreview?onDragEnd:undefined,
          onMouseLeave:imgPreview?onDragEnd:undefined,
          onTouchStart:imgPreview?onDragStart:undefined,
          onTouchMove:imgPreview?onDragMove:undefined,
          onTouchEnd:imgPreview?onDragEnd:undefined,
          style:{cursor:imgPreview?"grab":"default",userSelect:"none"}},
          h(CustomCardView,{card:previewCard})
        ),
        imgPreview&&h("div",{style:{fontSize:10,color:"#334155",letterSpacing:1}},"DRAG TO REPOSITION")
      )
    ),

    // ── LIBRARY TAB ──
    tab==="library"&&h("div",{style:{width:"100%",maxWidth:800,padding:"20px 16px",animation:"fadeIn .3s ease"}},
      cards.length===0
        ?h("div",{style:{textAlign:"center",color:"#475569",padding:40}},
            h("div",{style:{fontSize:32,marginBottom:12}},"🃏"),
            h("div",{style:{fontSize:14}},"No custom cards yet."),
            h("button",{className:"btn btn-s",onClick:()=>setTab("create"),style:{marginTop:16}},"Create Your First Card")
          )
        :h("div",{style:{display:"flex",flexWrap:"wrap",gap:20,justifyContent:"center"}},
            cards.map(c=>h("div",{key:c.id,style:{display:"flex",flexDirection:"column",alignItems:"center",gap:8}},
              h(CustomCardView,{card:c}),
              h("button",{className:"btn btn-danger",onClick:()=>deleteCard(c.id),
                style:{fontSize:11,padding:"4px 14px",letterSpacing:1}},"Delete")
            ))
          )
    )
  );
}

/* ═══ MAIN APP ════════════════════════════════════════════ */
function App(){
  const isMobile=useIsMobile();
  // Connection state
  const[screen,setScreen]=useState("menu"); // menu, waiting, game, creator
  const[creatorFromGame,setCreatorFromGame]=useState(false);
  const[vsBot,setVsBot]=useState(false);
  const[roomCode,setRoomCode]=useState("");
  const[joinInput,setJoinInput]=useState("");
  const[playerId,setPlayerId]=useState("");
  const[playerNum,setPlayerNum]=useState(0);
  const[error,setError]=useState("");

  // Game state from server
  const[gs,setGs]=useState(null);
  const pollRef=useRef(null);
  const[loading,setLoading]=useState(false);

  // Local UI state
  const[handSel,setHandSel]=useState(new Set());
  const[revealPhase,setRevealPhase]=useState(null);
  const[lastRound,setLastRound]=useState(-1);
  const prevHistLen=useRef(0);
  const prevMatchNum=useRef(1);
  const[customCards,setCustomCards]=useState([]);
  const[customCardsLoaded,setCustomCardsLoaded]=useState(false);

  // Load custom cards on mount and whenever returning from creator
  useEffect(()=>{
    setCustomCardsLoaded(false);
    fetch(`/api/cards?playerId=${LOCAL_PLAYER_ID}`)
      .then(r=>r.json()).then(d=>{ if(d.cards)setCustomCards(d.cards); setCustomCardsLoaded(true); })
      .catch(()=>setCustomCardsLoaded(true));
  },[screen]);

  // ── Polling ──
  const poll=useCallback(async()=>{
    if(!roomCode||!playerId)return;
    try{
      const data=await api(`poll?code=${roomCode}&playerId=${playerId}`);
      if(data.error){console.error(data.error);return;}
      setGs(data);
    }catch(e){console.error("poll failed",e);}
  },[roomCode,playerId]);

  useEffect(()=>{
    if(screen!=="waiting"&&screen!=="game")return;
    poll();
    pollRef.current=setInterval(poll,1200);
    return()=>clearInterval(pollRef.current);
  },[screen,poll]);

  // Transition from waiting to game when opponent joins
  useEffect(()=>{
    if(gs&&gs.opponentJoined&&screen==="waiting")setScreen("game");
  },[gs,screen]);

  // Clear hand selection when a new match starts (handles player who didn't click the button)
  useEffect(()=>{
    if(!gs)return;
    if(gs.matchNum!==prevMatchNum.current){
      setHandSel(new Set());
      prevHistLen.current=0;
      setRevealPhase(null);
      prevMatchNum.current=gs.matchNum;
    }
  },[gs?.matchNum]);

  // Detect new round results for reveal animation
  useEffect(()=>{
    if(!gs||!gs.history)return;
    if(gs.history.length>prevHistLen.current&&gs.history.length>0){
      const latest=gs.history[gs.history.length-1];
      setRevealPhase("flip");
      setTimeout(()=>setRevealPhase("attr"),2000);
      setTimeout(()=>setRevealPhase("result"),3500);
    }
    prevHistLen.current=gs.history.length;
  },[gs?.history?.length]);

  // ── Actions ──
  const createGame=async(isBot=false)=>{
    setLoading(true);setError("");
    const r=await api("create",{localPlayerId:LOCAL_PLAYER_ID,vsBot:isBot||undefined});
    setLoading(false);
    if(r.error){setError(r.error);return;}
    setVsBot(isBot);
    setRoomCode(r.code);setPlayerId(r.playerId);setPlayerNum(r.playerNum);
    setScreen(isBot?"game":"waiting");
  };

  const joinGame=async()=>{
    if(!joinInput.trim()){setError("Enter a room code");return;}
    setLoading(true);setError("");
    const r=await api("join",{code:joinInput.trim().toUpperCase(),localPlayerId:LOCAL_PLAYER_ID});
    setLoading(false);
    if(r.error){setError(r.error);return;}
    setRoomCode(r.code);setPlayerId(r.playerId);setPlayerNum(r.playerNum);setScreen("game");
  };

  const submitHand=async()=>{
    if(handSel.size!==9)return;
    await api("action",{code:roomCode,playerId,action:"hand",data:[...handSel]});
    poll();
  };

  const playCard=async(cardId)=>{
    if(gs.myPlayReady)return;
    await api("action",{code:roomCode,playerId,action:"play",data:cardId});
    poll();
  };

  const nextMatch=async()=>{
    await api("action",{code:roomCode,playerId,action:"next_match",data:null});
    setHandSel(new Set());
    prevHistLen.current=0;
    setRevealPhase(null);
    poll();
  };

  // ── Derived state ──
  const ccMap=gs?.customCardMap||{};
  const getCard=id=>CARD_MAP[id]||ccMap[id]||null;
  const myPlayedIds=gs?new Set((gs.history||[]).map(h=>playerNum===1?h.p1CardId:h.p2CardId)):new Set();
  const myHandCards=gs&&gs.myHand?gs.myHand.filter(id=>!myPlayedIds.has(id)).map(id=>getCard(id)).filter(Boolean):[];
  const latestResult=gs&&gs.history&&gs.history.length>0?gs.history[gs.history.length-1]:null;

  // ── Render helpers ──
  const h=React.createElement;

  const header=h("div",{style:{width:"100%",padding:"12px 24px",display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:"rgba(11,15,26,.95)",borderBottom:"1px solid rgba(255,255,255,0.05)"}},
    h("span",{style:{fontSize:18,fontWeight:900,letterSpacing:3,color:CLR[0]}},"THIRD"),
    h("span",{style:{fontSize:13}},"🔥❄️⚡"),
    h("span",{style:{fontSize:18,fontWeight:900,letterSpacing:3,color:CLR[1]}},"EDGE"),
    vsBot?h("span",{style:{fontSize:12,color:"#475569",marginLeft:12,fontWeight:600}},"vs Bot"):roomCode&&h("span",{style:{fontSize:12,color:"#475569",marginLeft:12,fontWeight:600}},`Room: ${roomCode}`)
  );

  // ═══ CARD CREATOR ═══
  if(screen==="creator"){
    return React.createElement(CardCreator,{
      startTab:customCards.length>=7?"library":"create",
      onBack:()=>setScreen(creatorFromGame?"game":"menu"),
      onSaved:creatorFromGame?(card)=>{
        // Add card to customCards, remove a random dealt card from the roster
        setCustomCards(prev=>[...prev,card]);
      }:null
    });
  }

  // ═══ MENU ═══
  if(screen==="menu"){
    return h("div",{style:{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center"}},
      header,
      h("div",{style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:24,animation:"fadeIn .6s ease",padding:24}},
        h("div",{style:{textAlign:"center"}},
          h("div",{style:{fontSize:48,fontWeight:900,letterSpacing:6,background:`linear-gradient(135deg,${CLR[0]},${CLR[1]},${CLR[2]})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},"THIRD EDGE"),
          h("div",{style:{fontSize:36,marginTop:4}},"🔥 ❄️ ⚡"),
          h("div",{style:{display:"flex",gap:12,justifyContent:"center",marginTop:8}},
            h("span",{style:{fontSize:14,fontWeight:700,color:CLR[0],letterSpacing:2}},"RAGE"),
            h("span",{style:{fontSize:14,color:"#334155"}},"·"),
            h("span",{style:{fontSize:14,fontWeight:700,color:CLR[1],letterSpacing:2}},"CHILL"),
            h("span",{style:{fontSize:14,color:"#334155"}},"·"),
            h("span",{style:{fontSize:14,fontWeight:700,color:CLR[2],letterSpacing:2}},"SPARK"),
          )
        ),
        h("div",{style:{maxWidth:400,textAlign:"center",color:"#94A3B8",lineHeight:1.7,fontSize:14}},
          `${ALL_CARDS.length} cards across 3 tiers. Standard · Focused · Specialist. Best-of-3 series.`
        ),
        // Create
        h("button",{className:"btn btn-p",onClick:()=>createGame(false),disabled:loading,style:{fontSize:16,padding:"14px 44px"}},loading?"Creating...":"Create Game"),
        h("button",{className:"btn btn-s",onClick:()=>createGame(true),disabled:loading,style:{fontSize:14,padding:"10px 32px"}},loading?"Creating...":"Play vs Bot"),
        // Join
        h("div",{style:{display:"flex",gap:8,alignItems:"center"}},
          h("input",{type:"text",value:joinInput,onChange:e=>setJoinInput(e.target.value.toUpperCase()),placeholder:"ROOM CODE",maxLength:4,
            style:{width:140,padding:"10px 14px",borderRadius:10,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",color:"white",fontSize:18,fontWeight:800,textAlign:"center",letterSpacing:6,outline:"none"}}),
          h("button",{className:"btn btn-s",onClick:joinGame,disabled:loading||!joinInput.trim()},"Join")
        ),
        error&&h("div",{style:{color:"#EF4444",fontSize:13,fontWeight:600}},error)
      )
    );
  }

  // ═══ WAITING ═══
  if(screen==="waiting"){
    return h("div",{style:{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center"}},
      header,
      h("div",{style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20,animation:"fadeIn .6s ease",padding:24}},
        h("div",{style:{fontSize:14,color:"#64748B",letterSpacing:2}},"WAITING FOR OPPONENT"),
        h("div",{style:{fontSize:64,fontWeight:900,letterSpacing:12,color:"white"}},roomCode),
        h("div",{style:{fontSize:13,color:"#94A3B8",textAlign:"center",maxWidth:300,lineHeight:1.6}},
          "Share this code with your opponent. The game starts when they join."
        ),
        h("button",{className:"btn btn-s",onClick:()=>{navigator.clipboard&&navigator.clipboard.writeText(roomCode)}},
          "📋 Copy Code"
        ),
        h("div",{style:{width:24,height:24,border:"3px solid rgba(255,255,255,.1)",borderTopColor:CLR[0],borderRadius:"50%",animation:"spin 1s linear infinite"}})
      )
    );
  }

  // ═══ GAME ═══
  if(!gs)return h("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}},
    h("div",{style:{width:24,height:24,border:"3px solid rgba(255,255,255,.1)",borderTopColor:CLR[0],borderRadius:"50%",animation:"spin 1s linear infinite"}})
  );

  const status=gs.status;

  // ── HAND PHASE ──
  if(status==="hand"){
    if(!customCardsLoaded)return h("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}},
      h("div",{style:{width:24,height:24,border:"3px solid rgba(255,255,255,.1)",borderTopColor:CLR[0],borderRadius:"50%",animation:"spin 1s linear infinite"}})
    );

    // Split roster by tier
    const roster=gs.myRoster||[];
    const rosterByTier={27:[],24:[],21:[]};
    roster.forEach(id=>{const c=CARD_MAP[id];if(c)rosterByTier[c.tier].push(c);});

    // Split custom cards by tier
    const customByTier={27:[],24:[],21:[]};
    customCards.forEach(c=>{
      const t=c.attrs.reduce((a,b)=>a+b,0);
      if(customByTier[t])customByTier[t].push(c);
    });

    // Each row = custom cards + enough generic to fill slot limit (7/4/4)
    const LIMITS={27:7,24:4,21:4};
    const PICKS={27:5,24:2,21:2};
    const rows={};
    [27,24,21].forEach(t=>{
      const custom=customByTier[t];
      const generic=rosterByTier[t].slice(0,Math.max(0,LIMITS[t]-custom.length));
      rows[t]=[...custom,...generic];
    });

    // Per-tier selection counts
    function getHandTier(id){
      if(id.startsWith("cc_")){const c=customCards.find(x=>x.id===id);return c?c.attrs.reduce((a,b)=>a+b,0):27;}
      return CARD_MAP[id]?.tier||27;
    }
    const tierSel={27:0,24:0,21:0};
    [...handSel].forEach(id=>{const t=getHandTier(id);tierSel[t]=(tierSel[t]||0)+1;});
    const handReady=tierSel[27]===5&&tierSel[24]===2&&tierSel[21]===2;

    function toggleCard(id){
      setHandSel(p=>{
        const s=new Set(p);
        if(s.has(id)){s.delete(id);}
        else{
          const t=getHandTier(id);
          if((tierSel[t]||0)<PICKS[t])s.add(id);
        }
        return s;
      });
    }

    const customCount=customCards.length;
    const TIER_META={
      27:{label:"STANDARD",color:"#10B981",desc:"Pick 5 of "+rows[27].length},
      24:{label:"FOCUSED", color:"#F59E0B",desc:"Pick 2 of "+rows[24].length},
      21:{label:"SPECIALIST",color:"#EF4444",desc:"Pick 2 of "+rows[21].length},
    };

    return h("div",{style:{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center"}},
      header,
      h("div",{style:{flex:1,width:"100%",maxWidth:960,padding:"10px 12px",animation:"fadeIn .4s ease"}},
        // Match indicator + series
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
          h("div",{style:{display:"flex",gap:8}},
            [1,2,3].map(m=>h("div",{key:m,style:{padding:"3px 10px",borderRadius:6,fontSize:11,fontWeight:700,
              background:m===gs.matchNum?`${CLR[0]}20`:"transparent",color:m===gs.matchNum?CLR[0]:"#475569",
              border:m===gs.matchNum?`1px solid ${CLR[0]}40`:"1px solid transparent"}},"Match "+m))
          ),
          h("div",{style:{display:"flex",alignItems:"center",gap:12}},
            h("div",{style:{fontSize:12,color:"#94A3B8"}},
              "Series: ",h("span",{style:{color:"#10B981",fontWeight:700}},gs.seriesScore[0])," – ",
              h("span",{style:{color:"#EF4444",fontWeight:700}},gs.seriesScore[1])
            ),
            h("button",{className:"btn btn-s",onClick:()=>{setCreatorFromGame(true);setScreen("creator");},
              style:{fontSize:10,padding:"4px 10px",letterSpacing:1}},
              customCount>=7?"✦ My Cards (7/7)":"✦ Card Creator")
          )
        ),
        // Pick summary
        h("div",{style:{textAlign:"center",marginBottom:10}},
          h("div",{style:{fontSize:17,fontWeight:700}},`Pick 9 — Match ${gs.matchNum}`),
          h("div",{style:{display:"flex",justifyContent:"center",gap:16,marginTop:4}},
            [27,24,21].map(t=>h("span",{key:t,style:{fontSize:11,fontWeight:700,
              color:tierSel[t]===PICKS[t]?"#10B981":TIER_META[t].color}},
              `${TIER_META[t].label} ${tierSel[t]}/${PICKS[t]}`))
          ),
          h("div",{style:{fontSize:11,color:"#475569",marginTop:2}},
            gs.opponentHandReady?"✓ Opponent ready":"⏳ Opponent picking...")
        ),
        // ── Three tier rows ──
        [27,24,21].map(t=>{
          const meta=TIER_META[t];
          return h("div",{key:t,style:{marginBottom:14}},
            h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:8}},
              h("div",{style:{fontSize:11,fontWeight:700,letterSpacing:2,color:meta.color}},meta.label),
              h("div",{style:{fontSize:10,color:"#475569"}},meta.desc),
              tierSel[t]===PICKS[t]&&h("div",{style:{fontSize:10,color:"#10B981",fontWeight:700,marginLeft:4}},"✓")
            ),
            rows[t].length===0
              ?h("div",{style:{fontSize:11,color:"#334155",fontStyle:"italic",padding:"4px 0"}},"No cards — create some in Card Creator")
              :h("div",{style:{display:"flex",flexWrap:"wrap",gap:8}},
                  rows[t].map(c=>h(CardView,{key:c.id,card:c,
                    sel:handSel.has(c.id),
                    dim:!handSel.has(c.id)&&tierSel[t]>=PICKS[t],
                    small:true,onClick:()=>toggleCard(c.id)}))
                )
          );
        }),
        h("div",{style:{textAlign:"center",marginTop:4}},
          gs.myHandReady
            ?h("div",{style:{fontSize:13,color:"#10B981",fontWeight:700}},"✓ Hand locked — waiting for opponent...")
            :h("button",{className:"btn btn-p",disabled:!handReady,onClick:submitHand},"Start Match "+gs.matchNum+" →")
        )
      )
    );
  }

  // ── REVEAL ANIMATION (runs regardless of status, so final round shows before end screen) ──
  if(revealPhase&&latestResult){
      const lr=latestResult;
      const myCard=getCard(playerNum===1?lr.p1CardId:lr.p2CardId);
      const opCard=getCard(playerNum===1?lr.p2CardId:lr.p1CardId);
      const myVal=playerNum===1?lr.p1v:lr.p2v;
      const opVal=playerNum===1?lr.p2v:lr.p1v;
      const iWon=(playerNum===1&&lr.winner==="p1")||(playerNum===2&&lr.winner==="p2");
      const iLost=(playerNum===1&&lr.winner==="p2")||(playerNum===2&&lr.winner==="p1");

      if(revealPhase==="flip"){
        return h("div",{style:{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",background:"#0B0F1A"}},header,
          h("div",{style:{flex:1,width:"100%",maxWidth:640,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20,padding:"0 16px"}},
            h("div",{style:{fontSize:11,color:"#475569",letterSpacing:3,fontWeight:700}},"CARDS REVEALED"),
            h("div",{style:{display:"flex",alignItems:"flex-start",justifyContent:"center",gap:20,width:"100%"}},
              h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:8,animation:"flipIn .6s ease",flex:1,maxWidth:200}},
                h("div",{style:{fontSize:10,color:"#10B981",fontWeight:700,letterSpacing:2}},"YOU"),
                h(CardView,{card:myCard,small:true})
              ),
              h("div",{style:{fontSize:22,fontWeight:900,color:"#1e293b",paddingTop:60}},"VS"),
              h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:8,animation:"flipIn .6s ease .2s both",flex:1,maxWidth:200}},
                h("div",{style:{fontSize:10,color:"#EF4444",fontWeight:700,letterSpacing:2}},"OPPONENT"),
                h(CardView,{card:opCard,small:true})
              )
            ),
            h("div",{style:{fontSize:11,color:"#334155",animation:"pulse 1s infinite",letterSpacing:1}},"Checking attribute...")
          )
        );
      }

      if(revealPhase==="attr"){
        return h("div",{style:{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",background:"#0B0F1A"}},header,
          h("div",{style:{flex:1,width:"100%",maxWidth:640,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20,padding:"0 16px"}},
            h("div",{style:{animation:"attrReveal .5s cubic-bezier(.4,0,.2,1)",display:"flex",alignItems:"center",gap:12,padding:"14px 32px",borderRadius:16,
              background:`${CLR[lr.attr]}18`,border:`2px solid ${CLR[lr.attr]}60`,boxShadow:`0 0 60px ${CLR_GLOW[lr.attr]}`}},
              h("span",{style:{fontSize:48}},SYM[lr.attr]),
              h("span",{style:{fontSize:26,fontWeight:900,color:CLR[lr.attr],letterSpacing:2}},ANAME[lr.attr].toUpperCase())
            ),
            h("div",{style:{display:"flex",alignItems:"flex-start",justifyContent:"center",gap:20,width:"100%"}},
              h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:6,flex:1,maxWidth:200}},
                h(CardView,{card:myCard,small:true}),
                h("div",{style:{fontSize:24,fontWeight:900,color:"#10B981",animation:"scorePopIn .4s ease"}},myVal)
              ),
              h("div",{style:{fontSize:18,fontWeight:900,color:"#1e293b",paddingTop:60}},"VS"),
              h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:6,flex:1,maxWidth:200}},
                h(CardView,{card:opCard,small:true}),
                h("div",{style:{fontSize:24,fontWeight:900,color:"#EF4444",animation:"scorePopIn .4s ease"}},opVal)
              )
            )
          )
        );
      }

      if(revealPhase==="result"){
        return h("div",{style:{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",background:"#0B0F1A"}},header,
          h("div",{style:{flex:1,width:"100%",maxWidth:640,padding:"16px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,animation:"slideUp .4s ease"}},
            // Result badge
            h("div",{style:{padding:"8px 28px",borderRadius:12,fontSize:18,fontWeight:900,letterSpacing:2,
              background:iWon?"rgba(16,185,129,.15)":iLost?"rgba(239,68,68,.15)":"rgba(234,179,8,.15)",
              color:iWon?"#10B981":iLost?"#EF4444":"#EAB308",
              border:`2px solid ${iWon?"#10B981":iLost?"#EF4444":"#EAB308"}40`,
              boxShadow:iWon?"0 0 30px rgba(16,185,129,.2)":iLost?"0 0 30px rgba(239,68,68,.2)":"none",
              animation:lr.winner==="tie"?"shake .4s ease":"scorePopIn .4s ease"}},
              iWon?`YOU WIN${lr.pts>1?" +"+lr.pts+" pts":""}`:iLost?`OPPONENT WINS${lr.pts>1?" +"+lr.pts+" pts":""}`: "TIE — CARRY +"+(lr.pts)
            ),
            // Score
            h("div",{style:{display:"flex",justifyContent:"center",alignItems:"center",gap:24}},
              h("div",{style:{textAlign:"center"}},
                h("div",{style:{fontSize:9,color:"#10B981",fontWeight:700,letterSpacing:2}},"YOU"),
                h("div",{style:{fontSize:40,fontWeight:900,color:"#10B981"}},gs.matchScore[playerNum===1?0:1])),
              h("div",{style:{fontSize:13,color:"#334155",fontWeight:700}},"—"),
              h("div",{style:{textAlign:"center"}},
                h("div",{style:{fontSize:9,color:"#EF4444",fontWeight:700,letterSpacing:2}},"OPP"),
                h("div",{style:{fontSize:40,fontWeight:900,color:"#EF4444"}},gs.matchScore[playerNum===1?1:0]))
            ),
            // Cards — full size on desktop, small on mobile
            h("div",{style:{display:"flex",alignItems:"flex-start",justifyContent:"center",gap:20,width:"100%"}},
              h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:6,flex:1,maxWidth:200,
                animation:iWon?"winGlow 1.5s ease infinite":"none",borderRadius:14}},
                h(CardView,{card:myCard,hl:iWon,small:true}),
                h("div",{style:{fontSize:11,fontWeight:700,color:CLR[lr.attr]}},SYM[lr.attr]+" "+myVal)
              ),
              h("div",{style:{fontSize:16,fontWeight:900,color:"#1e293b",paddingTop:60}},"vs"),
              h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:6,flex:1,maxWidth:200,
                animation:iLost?"loseGlow 1.5s ease infinite":"none",borderRadius:14}},
                h(CardView,{card:opCard,hl:iLost,small:true}),
                h("div",{style:{fontSize:11,fontWeight:700,color:CLR[lr.attr]}},SYM[lr.attr]+" "+opVal)
              )
            ),
            // Continue button
            h("button",{className:"btn btn-s",onClick:()=>setRevealPhase(null),
              style:{marginTop:4,fontSize:13,padding:"10px 32px",letterSpacing:1}},
              "Continue →")
          )
        );
      }
  }

  // ── PLAYING PHASE ──
  if(status==="playing"){
    // Normal play state
    const myScore=gs.matchScore[playerNum===1?0:1];
    const opScore=gs.matchScore[playerNum===1?1:0];
    return h("div",{style:{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center"}},
      header,
      h("div",{style:{flex:1,width:"100%",maxWidth:800,padding:"0 14px",animation:"fadeIn .3s ease"}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",fontSize:11,color:"#64748B"}},
          h("span",null,`Series ${gs.seriesScore[0]}–${gs.seriesScore[1]} · Match ${gs.matchNum}`),
          h("span",null,`Round ${(gs.history||[]).length+1}/9`)
        ),
        // Scoreboard
        h("div",{style:{display:"flex",justifyContent:"center",alignItems:"center",gap:28,marginBottom:2}},
          h("div",{style:{textAlign:"center"}},h("div",{style:{fontSize:9,color:"#10B981",fontWeight:700,letterSpacing:2}},"YOU"),
            h("div",{style:{fontSize:38,fontWeight:900,color:"#10B981"}},myScore)),
          h("div",{style:{width:50,height:50,borderRadius:"50%",border:"2px solid rgba(255,255,255,0.08)",display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(255,255,255,.02)"}},
            gs.myPlayReady
              ?h("div",{style:{width:20,height:20,border:"3px solid rgba(255,255,255,.1)",borderTopColor:CLR[1],borderRadius:"50%",animation:"spin 1s linear infinite"}})
              :h("span",{style:{fontSize:14,fontWeight:900,color:"#64748B"}},"⚔️")),
          h("div",{style:{textAlign:"center"}},h("div",{style:{fontSize:9,color:"#EF4444",fontWeight:700,letterSpacing:2}},"OPP"),
            h("div",{style:{fontSize:38,fontWeight:900,color:"#EF4444"}},opScore))
        ),
        h(AttrCount,{history:gs.history,carry:gs.carry}),
        // Opponent cards remaining
        h("div",{style:{display:"flex",justifyContent:"center",gap:3,marginBottom:8}},
          Array.from({length:9},(_,i)=>h("div",{key:i,style:{width:32,height:44,borderRadius:5,
            background:i<gs.opponentCardsLeft?"linear-gradient(180deg,#1e293b,#0f172a)":"transparent",
            border:i<gs.opponentCardsLeft?"1px solid rgba(255,255,255,.06)":"none",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:6,color:"#334155",fontWeight:900}},
            i<gs.opponentCardsLeft?"TE":""))
        ),
        h("div",{style:{height:1,background:"linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent)",margin:"0 0 8px"}}),
        h("div",{style:{textAlign:"center",marginBottom:6}},
          h("span",{style:{fontSize:11,color:"#64748B",fontWeight:600,letterSpacing:1}},
            gs.myPlayReady?"WAITING FOR OPPONENT...":"TAP A CARD")),
        // My hand
        h("div",{style:{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center"}},
          myHandCards.map(c=>h(CardView,{key:c.id,card:c,onClick:gs.myPlayReady?undefined:()=>playCard(c.id),dim:gs.myPlayReady,small:true}))
        ),
        // History
        (gs.history||[]).length>0&&h("div",{style:{marginTop:12,padding:"6px 8px",background:"rgba(255,255,255,.02)",borderRadius:8,border:"1px solid rgba(255,255,255,.04)"}},
          h("div",{style:{display:"flex",flexWrap:"wrap",gap:4}},
            (gs.history||[]).map((hr,i)=>{
              const iw=(playerNum===1&&hr.winner==="p1")||(playerNum===2&&hr.winner==="p2");
              const il=(playerNum===1&&hr.winner==="p2")||(playerNum===2&&hr.winner==="p1");
              return h("div",{key:i,style:{display:"flex",alignItems:"center",gap:2,padding:"2px 6px",borderRadius:4,fontSize:10,fontWeight:700,
                background:iw?"rgba(16,185,129,.1)":il?"rgba(239,68,68,.1)":"rgba(255,255,255,.03)",
                color:iw?"#10B981":il?"#EF4444":"#475569"}},
                h("span",null,SYM[hr.attr]),
                h("span",null,(playerNum===1?hr.p1v:hr.p2v)+"–"+(playerNum===1?hr.p2v:hr.p1v)),
                hr.pts>1&&h("span",{style:{color:"#F59E0B"}},"×"+hr.pts));
            })
          )
        ),
        gs.opponentPlayReady&&!gs.myPlayReady&&h("div",{style:{textAlign:"center",marginTop:8,fontSize:12,color:CLR[2],fontWeight:700,animation:"pulse 1s infinite"}},"⚡ Opponent is waiting on you!")
      )
    );
  }

  // ── MATCH END ──
  if(status==="match_end"){
    const myScore=gs.matchScore[playerNum===1?0:1];
    const opScore=gs.matchScore[playerNum===1?1:0];
    const won=myScore>opScore;
    return h("div",{style:{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center"}},header,
      h("div",{style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,animation:"slideUp .5s ease",padding:24}},
        h("div",{style:{fontSize:12,color:"#64748B",letterSpacing:2}},"MATCH "+gs.matchNum),
        h("div",{style:{fontSize:48,fontWeight:900,color:won?"#10B981":myScore===opScore?"#EAB308":"#EF4444"}},won?"VICTORY":myScore===opScore?"DRAW":"DEFEAT"),
        h("div",{style:{fontSize:32,fontWeight:800}},
          h("span",{style:{color:"#10B981"}},myScore),
          h("span",{style:{color:"#334155",margin:"0 10px"}},"–"),
          h("span",{style:{color:"#EF4444"}},opScore)),
        h("button",{className:"btn btn-p",onClick:nextMatch},"Match "+(gs.matchNum+1)+" →")
      )
    );
  }

  // ── SERIES END ──
  if(status==="series_end"){
    const myS=gs.seriesScore[playerNum===1?0:1];
    const opS=gs.seriesScore[playerNum===1?1:0];
    return h("div",{style:{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center"}},header,
      h("div",{style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20,animation:"slideUp .6s ease",padding:24}},
        h("div",{style:{fontSize:12,color:"#64748B",letterSpacing:3}},"SERIES COMPLETE"),
        h("div",{style:{fontSize:48,fontWeight:900,letterSpacing:3,background:myS>=2?"linear-gradient(135deg,#10B981,#34D399)":"linear-gradient(135deg,#EF4444,#F87171)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},myS>=2?"YOU WIN":"YOU LOSE"),
        h("div",{style:{fontSize:36,fontWeight:800}},
          h("span",{style:{color:"#10B981"}},myS),
          h("span",{style:{color:"#334155",margin:"0 12px"}},"–"),
          h("span",{style:{color:"#EF4444"}},opS)),
        h("button",{className:"btn btn-s",onClick:()=>location.reload()},"New Game")
      )
    );
  }

  // Fallback
  return h("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}},
    h("div",{style:{color:"#64748B"}},"Loading... Status: "+(gs?.status||"unknown")));
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
